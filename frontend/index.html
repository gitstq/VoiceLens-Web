<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceLens-Web 🎙️ - 语音交互AI助手</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 class="logo">🎙️ <span>VoiceLens</span></h2>
                <button class="btn-icon" id="closeSidebar" title="关闭侧边栏">✕</button>
            </div>
            <div class="sidebar-section">
                <button class="btn btn-primary btn-full" id="newChatBtn">
                    ✨ 新建对话
                </button>
            </div>
            <div class="sidebar-section">
                <h3 class="section-title">📋 对话历史</h3>
                <div class="session-list" id="sessionList">
                    <div class="empty-state">暂无对话记录</div>
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="config-indicator" id="apiStatus">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">检查中...</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-content" id="mainContent">
            <!-- Top Bar -->
            <header class="top-bar">
                <button class="btn-icon" id="menuBtn" title="菜单">☰</button>
                <div class="top-bar-title">
                    <h1>🎙️ VoiceLens-Web</h1>
                    <span class="subtitle" id="modelLabel">语音交互AI助手</span>
                </div>
                <div class="top-bar-actions">
                    <button class="btn-icon" id="clearChatBtn" title="清空对话">🗑️</button>
                    <button class="btn-icon" id="settingsBtn" title="设置">⚙️</button>
                </div>
            </header>

            <!-- Chat Messages -->
            <div class="chat-container" id="chatContainer">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">🎙️</div>
                    <h2>欢迎使用 VoiceLens-Web</h2>
                    <p class="welcome-desc">轻量级语音交互AI助手，支持GLM-5.1等多款大模型</p>
                    <div class="welcome-features">
                        <div class="feature-card">
                            <span class="feature-icon">🎤</span>
                            <span class="feature-text">语音输入</span>
                        </div>
                        <div class="feature-card">
                            <span class="feature-icon">🤖</span>
                            <span class="feature-text">智能对话</span>
                        </div>
                        <div class="feature-card">
                            <span class="feature-icon">🔊</span>
                            <span class="feature-text">语音朗读</span>
                        </div>
                        <div class="feature-card">
                            <span class="feature-icon">🌐</span>
                            <span class="feature-text">多模型支持</span>
                        </div>
                    </div>
                    <p class="welcome-tip">💡 点击麦克风按钮开始语音输入，或直接打字发送消息</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <button class="btn-icon voice-btn" id="voiceBtn" title="语音输入">
                        🎤
                    </button>
                    <textarea 
                        id="messageInput" 
                        class="message-input" 
                        placeholder="输入消息，或点击🎤使用语音..."
                        rows="1"
                    ></textarea>
                    <button class="btn btn-primary send-btn" id="sendBtn" disabled>
                        ➤
                    </button>
                </div>
                <div class="voice-indicator" id="voiceIndicator">
                    <div class="voice-pulse">
                        <span></span><span></span><span></span><span></span>
                    </div>
                    <span id="voiceStatusText">正在聆听...</span>
                    <button class="btn-icon voice-stop-btn" id="voiceStopBtn">✕</button>
                </div>
                <p class="input-hint">按 Enter 发送 · Shift+Enter 换行 · 语音输入需浏览器授权麦克风</p>
            </div>
        </main>

        <!-- Settings Modal -->
        <div class="modal-overlay" id="settingsModal">
            <div class="modal">
                <div class="modal-header">
                    <h2>⚙️ 设置</h2>
                    <button class="btn-icon" id="closeSettingsBtn">✕</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="providerSelect">🤖 LLM 提供商</label>
                        <select id="providerSelect">
                            <option value="zhipu">智谱AI (GLM-5.1)</option>
                            <option value="openai">OpenAI</option>
                            <option value="custom">自定义</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="apiKeyInput">🔑 API Key</label>
                        <input type="password" id="apiKeyInput" placeholder="输入你的 API Key">
                        <small>设置环境变量 VOICELENS_API_KEY 可跳过此步骤</small>
                    </div>
                    <div class="form-group">
                        <label for="baseUrlInput">🌐 API 地址</label>
                        <input type="text" id="baseUrlInput" placeholder="https://open.bigmodel.cn/api/paas/v4">
                    </div>
                    <div class="form-group">
                        <label for="modelInput">🧠 模型名称</label>
                        <input type="text" id="modelInput" placeholder="GLM-5.1-130B">
                    </div>
                    <div class="form-group">
                        <label for="temperatureRange">🌡️ 温度: <span id="tempValue">0.7</span></label>
                        <input type="range" id="temperatureRange" min="0" max="2" step="0.1" value="0.7">
                    </div>
                    <div class="form-group">
                        <label for="systemPromptInput">📝 系统提示词</label>
                        <textarea id="systemPromptInput" rows="4" placeholder="设置AI助手的角色和行为..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="ttsToggle">
                            <input type="checkbox" id="ttsToggle" checked>
                            🔊 启用语音朗读回复
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" id="resetSettingsBtn">重置</button>
                    <button class="btn btn-primary" id="saveSettingsBtn">💾 保存设置</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
